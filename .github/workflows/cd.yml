name: Spring Boot CD

on:
  workflow_run:
    workflows: ["Spring Boot CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: target

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/"

      - name: Restart Application on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "Demo-0.0.1-SNAPSHOT.jar" || true
            sleep 3

            JAR_FILE=$(find /home/ec2-user/target -name "*.jar" | head -n 1)

            echo "Starting application: $JAR_FILE"

            nohup java -jar "$JAR_FILE" > /home/ec2-user/app.log 2>&1 < /dev/null &

            sleep 10

            ps -ef | grep java
