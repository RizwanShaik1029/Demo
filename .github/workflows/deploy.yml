name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: mvn clean package

      - name: Verify JAR
        run: |
          echo "Contents of target:"
          ls -lh target

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/"

      - name: Restart Application on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -x

            echo "===== USER ====="
            whoami

            echo "===== JAVA ====="
            java -version

            echo "===== JARS ====="
            find /home/ec2-user -name "*.jar"

            echo "===== RUNNING JAVA ====="
            ps -ef | grep java || true

            PID=$(pgrep -f "Demo-0.0.1-SNAPSHOT.jar" || true)

            if [ -n "$PID" ]; then
              echo "Stopping application PID: $PID"
              kill -15 "$PID" || true
              sleep 5
            else
              echo "Application not running."
            fi

            JAR_FILE=$(find /home/ec2-user -name "Demo-0.0.1-SNAPSHOT.jar" | head -n 1)

            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: JAR not found."
              exit 1
            fi

            echo "Starting: $JAR_FILE"

            nohup java -jar "$JAR_FILE" > /home/ec2-user/app.log 2>&1 &

            sleep 15

            echo "===== JAVA AFTER START ====="
            ps -ef | grep java || true

            echo "===== LAST 100 LINES OF LOG ====="
            tail -100 /home/ec2-user/app.log || true
