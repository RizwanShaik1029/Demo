name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build Spring Boot project
      - name: Build Project
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: mvn clean package

      # Verify JAR
      - name: Verify JAR
        run: ls -lh target

      # Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/"

      # Restart Application on EC2
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -x

            echo "Current User:"
            whoami

            echo "Current Directory:"
            pwd

            echo "Java Version:"
            java -version

            echo "Listing /home/ec2-user"
            ls -R /home/ec2-user

            echo "Stopping existing application..."
            pkill -f "Demo-0.0.1-SNAPSHOT.jar" || true

            sleep 3

            JAR_FILE=$(find /home/ec2-user -name "*.jar" | head -n 1)

            echo "JAR Found: $JAR_FILE"

            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: No JAR file found!"
              exit 1
            fi

            echo "Starting Spring Boot application..."

            nohup java -jar "$JAR_FILE" > /home/ec2-user/app.log 2>&1 < /dev/null &

            sleep 10

            echo "Running Java Processes:"
            ps -ef | grep java

            echo "Application Log:"
            cat /home/ec2-user/app.log || true
