name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: mvn clean package -DskipTests

      - name: Verify JAR
        run: |
          echo "Contents of target:"
          ls -lh target

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/demo"

      - name: Restart Application on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MONGODB_URI
          command_timeout: 5m
          script: |
            set -e

            echo "===== USER ====="
            whoami

            echo "===== JAVA ====="
            java -version

            echo "===== Mongo URI Available ====="
            if [ -n "$MONGODB_URI" ]; then
              echo "YES"
            else
              echo "NO"
            fi

            PID=$(pgrep -f "Demo-0.0.1-SNAPSHOT.jar" || true)

            if [ -n "$PID" ]; then
              echo "Stopping application..."
              kill -15 "$PID"
              sleep 5
            fi

            JAR_FILE=$(find /home/ec2-user/demo -name "Demo-0.0.1-SNAPSHOT.jar" | head -n 1)

            if [ ! -f "$JAR_FILE" ]; then
              echo "Jar not found!"
              exit 1
            fi

            echo "Starting application..."

            nohup java -jar "$JAR_FILE" \
              > /home/ec2-user/app.log 2>&1 &

            sleep 15

            echo "===== Running Java ====="
            ps -ef | grep java || true

            echo "===== Mongo Variable Inside Process ====="
            PID=$(pgrep -f "Demo-0.0.1-SNAPSHOT.jar")
            cat /proc/$PID/environ | tr '\0' '\n' | grep MONGODB_URI || true

            echo "===== Last 50 Log Lines ====="
            tail -50 /home/ec2-user/app.log || true
