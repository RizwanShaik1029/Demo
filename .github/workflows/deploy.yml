name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build Spring Boot project
      - name: Build Project
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: mvn clean package

      # Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/"

      # Restart application on EC2
      - name: Restart Application on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "Demo-0.0.1-SNAPSHOT.jar" || true
            sleep 3

            JAR_FILE=$(find /home/ec2-user/target -name "*.jar" | head -n 1)

            echo "Starting application: $JAR_FILE"

            nohup java -jar "$JAR_FILE" > /home/ec2-user/app.log 2>&1 < /dev/null &

            sleep 10

            ps -ef | grep java
